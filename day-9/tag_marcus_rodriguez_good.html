<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Tag - Marcus Rodriguez</title>
  <style>
    /* CSS Variables for theming */
    :root {
      --primary-color: #1e3a5f;
      --accent-color: #c9a961;
      --text-color: #2c3e50;
      --background-color: #fdfbf7;
      --border-color: #d4c5a9;
      --navy-deep: #16264a;
      --gold-metallic: #b8964f;
    }

    /* Print specifications */
    @page {
      size: 4in 3in;
      margin: 0;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
      
      body {
        width: 4in;
        height: 3in;
      }
    }

    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Garamond', 'Baskerville', serif;
      color: var(--text-color);
      background-color: var(--background-color);
      width: 4in;
      height: 3in;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.3in;
    }

    /* Component styles based on elegant tag_style */
    .gift-tag {
      width: 100%;
      height: 100%;
      border: 2px solid var(--border-color);
      background: linear-gradient(to bottom, #fdfbf7 0%, #f9f6f0 100%);
      padding: 0.35in;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: inset 0 0 0 1px rgba(30, 58, 95, 0.1);
    }

    .gift-tag::before {
      content: '';
      position: absolute;
      top: 0.25in;
      left: 50%;
      transform: translateX(-50%);
      width: 2in;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent-color), transparent);
    }

    .gift-tag::after {
      content: '';
      position: absolute;
      bottom: 0.25in;
      left: 50%;
      transform: translateX(-50%);
      width: 2in;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent-color), transparent);
    }

    .header {
      text-align: center;
      margin-bottom: 0.15in;
    }

    .greeting {
      font-size: 8pt;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary-color);
      font-weight: normal;
      margin-bottom: 0.08in;
    }

    .recipient {
      font-size: 18pt;
      font-weight: normal;
      color: var(--navy-deep);
      letter-spacing: 0.02em;
      margin-bottom: 0.05in;
      font-style: italic;
    }

    .divider {
      width: 0.4in;
      height: 1px;
      background-color: var(--gold-metallic);
      margin: 0 auto 0.12in auto;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .gift-description {
      text-align: center;
      font-size: 9pt;
      color: var(--text-color);
      margin-bottom: 0.15in;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .poem {
      text-align: center;
      font-size: 7.5pt;
      line-height: 1.5;
      color: #4a5568;
      font-style: italic;
      margin-bottom: 0.15in;
      padding: 0 0.15in;
    }

    .poem-line {
      display: block;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
    }

    .sender {
      font-size: 7pt;
      color: var(--primary-color);
      letter-spacing: 0.05em;
      font-weight: normal;
    }

    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05in;
    }

    .qr-code {
      width: 0.65in;
      height: 0.65in;
      border: 1px solid var(--border-color);
      padding: 0.03in;
      background: white;
    }

    .qr-code img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-label {
      font-size: 5pt;
      color: #6b7280;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-align: center;
    }

    /* Decorative corner elements */
    .corner-ornament {
      position: absolute;
      width: 0.15in;
      height: 0.15in;
      border-style: solid;
      border-color: var(--accent-color);
    }

    .corner-ornament.top-left {
      top: 0.15in;
      left: 0.15in;
      border-width: 1px 0 0 1px;
    }

    .corner-ornament.top-right {
      top: 0.15in;
      right: 0.15in;
      border-width: 1px 1px 0 0;
    }

    .corner-ornament.bottom-left {
      bottom: 0.15in;
      left: 0.15in;
      border-width: 0 0 1px 1px;
    }

    .corner-ornament.bottom-right {
      bottom: 0.15in;
      right: 0.15in;
      border-width: 0 1px 1px 0;
    }
  </style>
</head>
<body>
  <!-- Design inspired by classic letterpress styling and Adam Argyle's precision minimalism -->
  <!-- Reference: https://codepen.io/argyleink for elegant spacing and typography -->
  <div class="gift-tag">
    <div class="corner-ornament top-left"></div>
    <div class="corner-ornament top-right"></div>
    <div class="corner-ornament bottom-left"></div>
    <div class="corner-ornament bottom-right"></div>

    <div class="header">
      <div class="greeting">Saludos de la Temporada</div>
      <div class="recipient">Marcus Rodriguez</div>
      <div class="divider"></div>
    </div>

    <div class="content">
      <div class="gift-description">Professional microphone</div>
      
      <div class="poem">
        <span class="poem-line">Que este micrófono lleve tu voz,</span>
        <span class="poem-line">Con claridad y distinción sin igual,</span>
        <span class="poem-line">Cada palabra, un arte magistral,</span>
        <span class="poem-line">Resonando con gracia y fervor veloz,</span>
        <span class="poem-line">Un regalo digno de tu profesión.</span>
      </div>
    </div>

    <div class="footer">
      <div class="sender">Winter Festival Team</div>
      
      <div class="qr-container">
        <div class="qr-code">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://example.com/thank-you-marcus" alt="QR Code">
        </div>
        <div class="qr-label">Mensaje Especial</div>
      </div>
    </div>
  </div>
</body>
</html>
