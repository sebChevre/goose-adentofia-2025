<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Tag - Sarah Chen</title>
  <style>
    /* Design inspired by Jhey Tompkins' festive CSS art: https://codepen.io/jh3y */
    
    /* CSS Variables for theming */
    :root {
      --primary-color: #DC143C; /* Crimson red */
      --accent-color: #228B22; /* Forest green */
      --gold-accent: #FFD700;
      --text-color: #2C1810;
      --background-color: #FFFEF9;
      --border-color: #DC143C;
    }

    /* Print specifications */
    @page {
      size: 4in 3in;
      margin: 0;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
    }

    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--text-color);
      background-color: var(--background-color);
      width: 4in;
      height: 3in;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Festive background decorations */
    body::before {
      content: '❄';
      position: absolute;
      top: 0.2in;
      left: 0.3in;
      font-size: 24pt;
      color: var(--primary-color);
      opacity: 0.3;
    }

    body::after {
      content: '❄';
      position: absolute;
      bottom: 0.2in;
      right: 0.3in;
      font-size: 24pt;
      color: var(--accent-color);
      opacity: 0.3;
    }

    .gift-tag {
      width: 3.6in;
      height: 2.6in;
      background: linear-gradient(135deg, #FFFEF9 0%, #FFF8F0 100%);
      border: 4px solid var(--primary-color);
      border-radius: 12px;
      padding: 0.35in;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      box-shadow: inset 0 0 0 2px var(--gold-accent);
    }

    /* Corner decorations */
    .gift-tag::before {
      content: '✦';
      position: absolute;
      top: 0.15in;
      right: 0.15in;
      font-size: 16pt;
      color: var(--gold-accent);
    }

    .gift-tag::after {
      content: '✦';
      position: absolute;
      bottom: 0.15in;
      left: 0.15in;
      font-size: 16pt;
      color: var(--gold-accent);
    }

    /* Festive header with holly decoration */
    .header {
      text-align: center;
      border-bottom: 2px solid var(--accent-color);
      padding-bottom: 0.12in;
      margin-bottom: 0.08in;
      position: relative;
    }

    .header::before {
      content: '🌟';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -0.15in;
      font-size: 14pt;
    }

    .greeting {
      font-size: 11pt;
      font-weight: bold;
      color: var(--accent-color);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.05in;
    }

    .recipient {
      font-size: 26pt;
      font-weight: bold;
      color: var(--primary-color);
      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
      line-height: 1.1;
      text-shadow: 1px 1px 0px rgba(255, 215, 0, 0.3);
    }

    /* Main content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.12in;
    }

    .gift-description {
      font-size: 11pt;
      text-align: center;
      color: var(--text-color);
      font-style: italic;
      padding: 0.08in;
      background: linear-gradient(90deg, transparent, rgba(220, 20, 60, 0.05) 50%, transparent);
      border-left: 3px solid var(--gold-accent);
      border-right: 3px solid var(--gold-accent);
    }

    .poem {
      font-size: 9pt;
      text-align: center;
      line-height: 1.4;
      color: var(--text-color);
      font-family: 'Georgia', serif;
      padding: 0.1in 0.05in;
      position: relative;
    }

    .poem::before {
      content: '❅';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12pt;
      color: var(--accent-color);
      opacity: 0.4;
    }

    .poem::after {
      content: '❅';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12pt;
      color: var(--accent-color);
      opacity: 0.4;
    }

    /* Footer with sender */
    .footer {
      text-align: center;
      border-top: 2px solid var(--accent-color);
      padding-top: 0.1in;
      position: relative;
    }

    .sender {
      font-size: 9pt;
      color: var(--text-color);
      font-weight: 600;
    }

    .sender::before {
      content: '~ ';
      color: var(--primary-color);
    }

    .sender::after {
      content: ' ~';
      color: var(--primary-color);
    }

    /* Festive accent dots */
    .decoration {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--primary-color);
    }

    .decoration:nth-child(1) {
      top: 0.4in;
      left: 0.2in;
      background-color: var(--gold-accent);
    }

    .decoration:nth-child(2) {
      top: 0.5in;
      right: 0.25in;
      background-color: var(--accent-color);
    }

    .decoration:nth-child(3) {
      bottom: 0.5in;
      left: 0.25in;
      background-color: var(--accent-green);
    }

    .decoration:nth-child(4) {
      bottom: 0.4in;
      right: 0.2in;
      background-color: var(--primary-color);
    }
  </style>
</head>
<body>
  <!-- Design inspired by Jhey Tompkins' festive holiday designs: https://codepen.io/jh3y/pen/poNeapO -->
  <div class="gift-tag">
    <span class="decoration"></span>
    <span class="decoration"></span>
    <span class="decoration"></span>
    <span class="decoration"></span>
    
    <div class="header">
      <div class="greeting">Season's Greetings</div>
      <div class="recipient">Sarah Chen</div>
    </div>

    <div class="content">
      <div class="gift-description">
        A Handmade Scarf
      </div>

      <div class="poem">
        Wrapped in warmth and winter's care,<br>
        This handmade gift we lovingly share.<br>
        May it bring you comfort through the cold,<br>
        A treasure crafted, precious as gold.<br>
        With every thread, our wishes weave,<br>
        Joy and peace this holiday eve.
      </div>
    </div>

    <div class="footer">
      <div class="sender">Festival Committee</div>
    </div>
  </div>
</body>
</html>
