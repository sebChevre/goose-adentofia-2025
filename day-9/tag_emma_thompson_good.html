<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Tag - Emma Thompson</title>
  <style>
    /* Design inspired by Adam Argyle's minimalist precision and clean layouts
       Reference: https://codepen.io/argyleink */
    
    /* CSS Variables for theming */
    :root {
      --primary-color: #D4AF37; /* Gold */
      --accent-color: #2C2C2C; /* Deep charcoal */
      --text-color: #1A1A1A;
      --background-color: #FEFEFE;
      --border-color: #D4AF37;
      --subtle-gray: #E8E8E8;
    }

    /* Print specifications */
    @page {
      size: 3in 2in;
      margin: 0;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
    }

    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--text-color);
      background-color: var(--background-color);
      width: 3in;
      height: 2in;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .gift-tag {
      width: 100%;
      height: 100%;
      padding: 0.25in;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: 0.08in;
      position: relative;
      background: linear-gradient(135deg, #FEFEFE 0%, #F9F9F9 100%);
    }

    /* Minimalist gold accent line */
    .gift-tag::before {
      content: '';
      position: absolute;
      top: 0.15in;
      left: 0.25in;
      width: 0.4in;
      height: 1px;
      background-color: var(--primary-color);
    }

    .recipient {
      grid-column: 1 / 2;
      grid-row: 1;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: var(--accent-color);
      margin-top: 0.08in;
    }

    .qr-container {
      grid-column: 2 / 3;
      grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.04in;
    }

    .qr-code {
      width: 0.75in;
      height: 0.75in;
      border: 1px solid var(--subtle-gray);
      border-radius: 2px;
    }

    .qr-label {
      font-size: 5px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 400;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    .content-area {
      grid-column: 1 / 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.06in;
    }

    .gift-description {
      font-size: 8px;
      font-weight: 400;
      color: var(--text-color);
      line-height: 1.3;
    }

    .poem {
      font-size: 6.5px;
      font-style: italic;
      color: #555;
      line-height: 1.4;
      font-weight: 300;
      margin-top: 0.02in;
    }

    .sender {
      grid-column: 1 / 2;
      grid-row: 3;
      font-size: 6px;
      color: #888;
      font-weight: 300;
      letter-spacing: 0.3px;
      align-self: end;
    }

    /* Minimalist geometric accent */
    .decoration {
      position: absolute;
      bottom: 0.15in;
      right: 0.25in;
      width: 0.15in;
      height: 0.15in;
      border: 1px solid var(--primary-color);
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <!-- Design inspired by Adam Argyle's minimalist precision
       https://codepen.io/argyleink/pen/vYexgjO -->
  <div class="gift-tag">
    <div class="recipient">Emma Thompson</div>
    
    <div class="qr-container">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://example.com/special-message" 
           alt="QR Code" 
           class="qr-code">
      <div class="qr-label">Message</div>
    </div>
    
    <div class="content-area">
      <div class="gift-description">Artisan chocolate collection</div>
      <div class="poem">
        Doux moments de chocolat,<br>
        Avec gratitude et joie.
      </div>
    </div>
    
    <div class="sender">Mayor's Office</div>
    
    <div class="decoration"></div>
  </div>
</body>
</html>
