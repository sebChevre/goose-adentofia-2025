<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Music Performance - Winter Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .poster {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0933 50%, #0f0522 100%);
            max-width: 800px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(184, 134, 11, 0.3),
                        inset 0 0 100px rgba(184, 134, 11, 0.1);
            border: 3px solid #b8860b;
            padding: 60px 50px;
            position: relative;
            overflow: hidden;
        }

        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .festival-badge {
            text-align: center;
            margin-bottom: 30px;
        }

        .festival-name {
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffd700;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .decorative-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b8860b, transparent);
            margin: 15px auto;
        }

        .event-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .emoji-decoration {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .event-name {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700 0%, #fff 50%, #c0c0c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
            line-height: 1.2;
            margin-bottom: 20px;
            font-family: 'Didot', 'Bodoni MT', 'Times New Roman', serif;
        }

        .event-details {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(184, 134, 11, 0.3);
            border-radius: 15px;
            padding: 35px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            font-size: 24px;
            color: #f0e68c;
        }

        .detail-emoji {
            font-size: 32px;
            margin-right: 15px;
        }

        .detail-text {
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .date-time {
            color: #ffd700;
            font-size: 28px;
        }

        .location {
            color: #e6e6fa;
            font-size: 26px;
        }

        .musical-notes {
            text-align: center;
            font-size: 40px;
            margin: 30px 0;
            opacity: 0.6;
            letter-spacing: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(184, 134, 11, 0.3);
        }

        .footer-text {
            font-size: 20px;
            color: #c0c0c0;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .accent-emojis {
            font-size: 24px;
            margin-top: 15px;
            letter-spacing: 15px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .poster {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                page-break-inside: avoid;
            }
        }

        @media (max-width: 768px) {
            .poster {
                padding: 40px 30px;
            }

            .event-name {
                font-size: 40px;
            }

            .detail-row {
                font-size: 20px;
            }

            .date-time {
                font-size: 24px;
            }

            .location {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="content">
            <div class="festival-badge">
                <div class="festival-name">❄️ Winter Festival ❄️</div>
                <div class="decorative-line"></div>
            </div>

            <div class="event-header">
                <div class="emoji-decoration">🎭🎵🎼</div>
                <h1 class="event-name">Live Music Performance</h1>
            </div>

            <div class="event-details">
                <div class="detail-row">
                    <span class="detail-emoji">🗓️</span>
                    <span class="detail-text date-time">December 18</span>
                </div>
                
                <div class="detail-row">
                    <span class="detail-emoji">🕖</span>
                    <span class="detail-text date-time">7:00 PM – 9:00 PM</span>
                </div>

                <div class="musical-notes">🎤 🎸 🎹 🎺</div>

                <div class="detail-row">
                    <span class="detail-emoji">📍</span>
                    <span class="detail-text location">Main Stage</span>
                </div>
            </div>

            <div class="footer">
                <p class="footer-text">An Unforgettable Evening of Musical Excellence</p>
                <div class="accent-emojis">✨ 🎼 ✨</div>
            </div>
        </div>
    </div>
</body>
</html>
