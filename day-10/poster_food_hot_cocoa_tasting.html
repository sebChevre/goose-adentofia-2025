<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Cocoa Tasting - Winter Festival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #d4a574 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .poster {
            max-width: 800px;
            width: 100%;
            background: linear-gradient(165deg, #8B4513 0%, #A0522D 25%, #CD853F 50%, #DEB887 75%, #F5DEB3 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }
        
        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .header {
            background: linear-gradient(135deg, #6B2E1E 0%, #8B4513 50%, #A0522D 100%);
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
            border-bottom: 5px solid #F5DEB3;
        }
        
        .brand {
            font-family: 'Pacifico', cursive;
            font-size: 1.4rem;
            color: #F5DEB3;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }
        
        .event-name {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            color: #FFF8DC;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
            line-height: 1.2;
            position: relative;
        }
        
        .emoji-accent {
            font-size: 3.5rem;
            display: inline-block;
            margin: 0 10px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .content {
            background: linear-gradient(180deg, #FFF8DC 0%, #FFE4B5 100%);
            padding: 50px 40px;
            position: relative;
        }
        
        .detail-section {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.15);
            border-left: 5px solid #8B4513;
            transition: transform 0.3s ease;
        }
        
        .detail-section:hover {
            transform: translateX(5px);
        }
        
        .detail-icon {
            font-size: 2rem;
            margin-right: 15px;
            vertical-align: middle;
        }
        
        .detail-label {
            font-weight: 700;
            font-size: 1.3rem;
            color: #6B2E1E;
            margin-bottom: 8px;
            display: block;
        }
        
        .detail-value {
            font-size: 1.8rem;
            color: #8B4513;
            font-weight: 600;
            display: inline-block;
        }
        
        .decorative-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #8B4513, transparent);
            margin: 30px 0;
        }
        
        .footer {
            background: linear-gradient(135deg, #6B2E1E 0%, #8B4513 100%);
            padding: 30px;
            text-align: center;
            color: #F5DEB3;
        }
        
        .footer-message {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .footer-emojis {
            font-size: 2rem;
            letter-spacing: 10px;
        }
        
        .cocoa-steam {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: steam 4s ease-in-out infinite;
        }
        
        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 0.1; }
            100% { transform: translateY(-40px) scale(1.5); opacity: 0; }
        }
        
        .steam-1 { top: 10%; left: 15%; animation-delay: 0s; }
        .steam-2 { top: 15%; right: 20%; animation-delay: 1s; }
        .steam-3 { top: 12%; left: 50%; animation-delay: 2s; }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .poster {
                box-shadow: none;
                max-width: 100%;
            }
            
            .detail-section:hover {
                transform: none;
            }
        }
        
        @media (max-width: 600px) {
            .event-name {
                font-size: 2.5rem;
            }
            
            .emoji-accent {
                font-size: 2rem;
            }
            
            .detail-value {
                font-size: 1.4rem;
            }
            
            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="cocoa-steam steam-1">☕</div>
        <div class="cocoa-steam steam-2">☕</div>
        <div class="cocoa-steam steam-3">☕</div>
        
        <div class="header">
            <div class="brand">❄️ Winter Festival ❄️</div>
            <h1 class="event-name">
                <span class="emoji-accent">☕</span>
                Hot Cocoa Tasting
                <span class="emoji-accent">🍫</span>
            </h1>
        </div>
        
        <div class="content">
            <div class="detail-section">
                <span class="detail-icon">📅</span>
                <span class="detail-label">Date & Time</span>
                <div class="detail-value">December 15, 2pm–4pm</div>
            </div>
            
            <div class="detail-section">
                <span class="detail-icon">📍</span>
                <span class="detail-label">Location</span>
                <div class="detail-value">Main Plaza</div>
            </div>
            
            <div class="decorative-line"></div>
            
            <div style="text-align: center; padding: 20px;">
                <p style="font-size: 1.6rem; color: #6B2E1E; font-weight: 600; margin-bottom: 15px;">
                    🍰 Warm up with delicious cocoa varieties! 🥘
                </p>
                <p style="font-size: 1.3rem; color: #8B4513; line-height: 1.6;">
                    Join us for an afternoon of indulgence featuring<br>
                    rich hot chocolate, gourmet toppings, and cozy vibes!
                </p>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-message">
                Warm Hearts, Sweet Treats! ☕✨
            </div>
            <div class="footer-emojis">🍴 🍷 ☕ 🍰</div>
        </div>
    </div>
</body>
</html>
