<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igloofest - Winter Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .poster {
            max-width: 800px;
            width: 100%;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 50%, #0a0520 100%);
            border: 3px solid #d4af37;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3), 
                        0 0 100px rgba(138, 43, 226, 0.2),
                        inset 0 0 60px rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 60px 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 30px;
        }

        .emoji-decoration {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .event-name {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37 0%, #f4e4c1 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-family: 'Didot', 'Bodoni MT', 'Garamond', serif;
        }

        .tagline {
            font-size: 1.8rem;
            color: #c0c0c0;
            font-style: italic;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .details-section {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 35px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin: 20px 0;
            font-size: 1.4rem;
            color: #e0e0e0;
        }

        .detail-emoji {
            font-size: 2rem;
            margin-right: 15px;
            min-width: 40px;
        }

        .detail-label {
            font-weight: bold;
            color: #d4af37;
            margin-right: 10px;
        }

        .description {
            background: rgba(138, 43, 226, 0.1);
            border-left: 4px solid #d4af37;
            padding: 25px;
            margin: 30px 0;
            border-radius: 10px;
            font-size: 1.3rem;
            color: #e0e0e0;
            line-height: 1.6;
            font-style: italic;
        }

        .ticket-info {
            text-align: center;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(138, 43, 226, 0.2) 100%);
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            font-size: 1.5rem;
            color: #f4e4c1;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #d4af37;
        }

        .footer-text {
            font-size: 1.3rem;
            color: #c0c0c0;
            font-style: italic;
            margin-bottom: 15px;
        }

        .festival-brand {
            font-size: 1.1rem;
            color: #d4af37;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .decorative-emojis {
            font-size: 2rem;
            margin: 10px 0;
            letter-spacing: 10px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .poster {
                max-width: 100%;
                box-shadow: none;
                border: 3px solid #d4af37;
                page-break-inside: avoid;
            }

            @page {
                margin: 0.5cm;
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 40px 30px;
            }

            .event-name {
                font-size: 3.5rem;
            }

            .tagline {
                font-size: 1.4rem;
            }

            .detail-item {
                font-size: 1.2rem;
            }

            .description {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="content">
            <div class="header">
                <div class="emoji-decoration">🎭 ❄️ 🎵</div>
                <h1 class="event-name">Igloofest</h1>
                <p class="tagline">Are you cool?</p>
            </div>

            <div class="details-section">
                <div class="detail-item">
                    <span class="detail-emoji">📅</span>
                    <span class="detail-label">Date:</span>
                    <span>February 21, 2025 @ 5pm</span>
                </div>
                <div class="detail-item">
                    <span class="detail-emoji">📍</span>
                    <span class="detail-label">Location:</span>
                    <span>Old Port</span>
                </div>
                <div class="detail-item">
                    <span class="detail-emoji">🎪</span>
                    <span class="detail-label">Event Type:</span>
                    <span>Performance</span>
                </div>
            </div>

            <div class="description">
                🎼 Come have a drink in one of the 200 igloos! 🎤
            </div>

            <div class="ticket-info">
                🎫 Tickets are a Tooney 🎸
            </div>

            <div class="footer">
                <div class="decorative-emojis">❄️ 🎭 ❄️ 🎵 ❄️ 🎼 ❄️</div>
                <p class="footer-text">An unforgettable winter performance awaits!</p>
                <p class="festival-brand">WINTER FESTIVAL 2025</p>
            </div>
        </div>
    </div>
</body>
</html>
