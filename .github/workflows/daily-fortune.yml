name: Daily Fortune

on:
  schedule:
    # Runs at 6am Eastern Time (11am UTC during EST, 10am UTC during EDT)
    # Using 11am UTC to cover EST (UTC-5)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual triggering for testing

permissions:
  contents: write

jobs:
  update-fortune:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install goose
        run: |
          curl -fsSL https://github.com/block/goose/releases/download/stable/goose-x86_64-unknown-linux-gnu.tar.bz2 -o goose.tar.bz2
          tar -xjf goose.tar.bz2
          mkdir -p ~/.local/bin
          mv goose ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Goose Config
        run: |
          mkdir -p ~/.config/goose

          # Create minimal config file for Infomaniak AI provider
          cat > ~/.config/goose/config.yaml << 'EOF'
          GOOSE_PROVIDER: openai
          GOOSE_MODEL: Qwen/Qwen3.5-122B-A10B-FP8
          GOOSE_TELEMETRY_ENABLED: false
          keyring: false

          OPENAI_TIMEOUT: '600'
          OPENAI_HOST: https://api.infomaniak.com/2/ai/101165/openai
          OPENAI_BASE_PATH: v1/chat/completions

          extensions:
            developer:
              enabled: true
              type: platform
              name: developer
              description: Write and edit files, and execute shell commands
              display_name: Developer
              bundled: true
              available_tools: []
          EOF

          # Verify config was created
          echo "Config file contents:"
          cat ~/.config/goose/config.yaml

      - name: Generate fortune and update README
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Generate a random mood for variety
          MOODS=("sarcastic" "wise" "introspective" "grumpy" "poetic")
          MOOD=${MOODS[$RANDOM % ${#MOODS[@]}]}

          echo "Today's fortune mood: $MOOD"

          # Create prompt file
          cat > /tmp/prompt.txt << PROMPT_EOF
          $(cat prompt.txt)
          PROMPT_EOF

          # Run goose with verbose output to see what happens
          echo "Running goose..."
          ~/.local/bin/goose run --no-session -i /tmp/prompt.txt || {
            echo "Goose command failed. Check logs above."
            exit 1
          }

          # Verify the file was created
          if [ ! -f "fortune.md" ]; then
            echo "Error: fortune.md was not generated"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi

          echo "Fortune file created successfully:"
          cat fortune.md

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fortune.md
          git add old/
          git diff --staged --quiet || git commit -m "🔮 Update daily fortune - $(date +'%Y-%m-%d')"
          git push origin HEAD:main
