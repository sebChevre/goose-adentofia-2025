name: Daily Fortune

on:
  schedule:
    # Runs at 6am Eastern Time (11am UTC during EST, 10am UTC during EDT)
    # Using 11am UTC to cover EST (UTC-5)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual triggering for testing

permissions:
  contents: write

jobs:
  update-fortune:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install goose
        run: |
          curl -fsSL https://github.com/block/goose/releases/download/stable/goose-x86_64-unknown-linux-gnu.tar.bz2 -o goose.tar.bz2
          tar -xjf goose.tar.bz2
          mkdir -p ~/.local/bin
          mv goose ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Goose Config
        run: |
          mkdir -p ~/.config/goose

          # Create config file matching local setup (Infomaniak AI provider)
          cat > ~/.config/goose/config.yaml << 'EOF'
          GOOSE_PROVIDER: openai
          GOOSE_MODEL: Qwen/Qwen3.5-122B-A10B-FP8
          GOOSE_TELEMETRY_ENABLED: false
          keyring: false

          OPENAI_TIMEOUT: '600'
          OPENAI_HOST: https://api.infomaniak.com/2/ai/101165/openai
          OPENAI_BASE_PATH: v1/chat/completions

          extensions:
            developer:
              enabled: true
              type: platform
              name: developer
              description: Write and edit files, and execute shell commands
              display_name: Developer
              bundled: true
              available_tools: []
            todo:
              enabled: true
              type: platform
              name: todo
              description: Enable a todo list for goose so it can keep track of what it is doing
              display_name: Todo
              bundled: true
              available_tools: []
            summarize:
              enabled: true
              type: platform
              name: summarize
              description: Load files/directories and get an LLM summary in a single call
              display_name: Summarize
              bundled: true
              available_tools: []
            code_execution:
              enabled: true
              type: platform
              name: code_execution
              description: Goose will make extension calls through code execution, saving tokens
              display_name: Code Mode
              bundled: true
              available_tools: []
            summon:
              enabled: true
              type: platform
              name: summon
              description: Load knowledge and delegate tasks to subagents
              display_name: Summon
              bundled: true
              available_tools: []
            apps:
              enabled: true
              type: platform
              name: apps
              description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
              display_name: Apps
              bundled: true
              available_tools: []
            analyze:
              enabled: true
              type: platform
              name: analyze
              description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
              display_name: Analyze
              bundled: true
              available_tools: []
            memory:
              enabled: true
              type: builtin
              name: memory
              description: Teach goose your preferences as you go.
              display_name: Memory
              timeout: 300
              bundled: true
              available_tools: []
            orchestrator:
              enabled: true
              type: platform
              name: orchestrator
              description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
              display_name: Orchestrator
              bundled: true
              available_tools: []
            skills:
              enabled: true
              type: platform
              name: skills
              description: Discover and provide skill instructions from filesystem and builtins
              display_name: Skills
              bundled: true
              available_tools: []
            computercontroller:
              enabled: true
              type: builtin
              name: computercontroller
              description: General computer control tools that don't require you to be a developer or engineer.
              display_name: Computer Controller
              timeout: 300
              bundled: true
              available_tools: []
          EOF

          # Verify config was created
          echo "Config file contents:"
          cat ~/.config/goose/config.yaml

      - name: Generate fortune and update README
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Generate a random mood for variety
          MOODS=("sarcastic" "wise" "introspective" "grumpy" "poetic")
          MOOD=${MOODS[$RANDOM % ${#MOODS[@]}]}

          echo "Today's fortune mood: $MOOD"

          # Create prompt file to avoid quoting issues
          cat > /tmp/prompt.txt << PROMPT_EOF
          Create a Python script called generate_fortune.py that generates a fortune from a fictional fortune teller with a $MOOD mood. The fortune should be visually appealing leveraging ascii art. Since it's $MOOD, draw a sassy goose in ascii art with the fortune above it. The whole thing should have an ascii border and there should be a divider between the sassy goose and fortune. The Python script should write the output to fortune.md in the current directory. Then run the Python script.
          PROMPT_EOF

          # Run goose with the prompt from file, suppress its output
          ~/.local/bin/goose run --no-session -i /tmp/prompt.txt > /dev/null 2>&1

          # Verify the file was created
          if [ ! -f "fortune.md" ]; then
            echo "Error: fortune.md was not generated"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fortune.md
          git diff --staged --quiet || git commit -m "🔮 Update daily fortune - $(date +'%Y-%m-%d')"
          git push origin HEAD:main
